name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (for example 1.0.0)"
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.22.0"
  GOMOBILE_VERSION: "v0.0.0-20231127183840-76ac6878022f"

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${REF_NAME#v}"
          fi

          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

  validate-core:
    name: Validate Go Core
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Download dependencies
        working-directory: ./core
        run: go mod download

      - name: Run core tests
        working-directory: ./core
        run: go test ./...

  build-windows-installer:
    name: Windows Installer
    runs-on: windows-2022
    needs: [prepare, validate-core]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Nebula installer
        shell: pwsh
        run: .\scripts\build-installer-windows.ps1 -Brand "Nebula" -Version "${env:VERSION}"

      - name: Build PepeWatafa installer
        shell: pwsh
        run: .\scripts\build-installer-windows.ps1 -Brand "PepeWatafa" -Version "${env:VERSION}"

      - name: Upload Windows installers
        uses: actions/upload-artifact@v7
        with:
          name: windows-installers
          path: dist/windows/*-Setup.exe
          if-no-files-found: error

  build-macos-installer:
    name: macOS Installer
    runs-on: macos-14
    needs: [prepare, validate-core]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Check macOS project readiness
        id: preflight
        shell: bash
        run: |
          if [ -f "apps/macos/NexusVPN.xcodeproj/project.pbxproj" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=macOS skipped::apps/macos/NexusVPN.xcodeproj is missing. macOS installer packaging is disabled until the Xcode project and signing assets exist."
          fi

      - name: Install dependencies
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          brew install create-dmg
          go install golang.org/x/mobile/cmd/gomobile@${GOMOBILE_VERSION}
          gomobile init

      - name: Build Nebula DMG
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        env:
          BRAND: Nebula
          VERSION: ${{ env.VERSION }}
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash ./scripts/build-installer-macos.sh

      - name: Build PepeWatafa DMG
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        env:
          BRAND: PepeWatafa
          VERSION: ${{ env.VERSION }}
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash ./scripts/build-installer-macos.sh

      - name: Upload macOS installers
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: macos-installers
          path: dist/macos/*.dmg
          if-no-files-found: error

  build-android-apk:
    name: Android APK (${{ matrix.brand }})
    runs-on: ubuntu-latest
    needs: [prepare, validate-core]
    strategy:
      fail-fast: false
      matrix:
        brand: [nebula, pepewatafa]
    env:
      BUILD_TYPE: debug
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.7"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        shell: bash
        run: |
          go install golang.org/x/mobile/cmd/gomobile@${GOMOBILE_VERSION}
          gomobile init

      - name: Build APK
        shell: bash
        env:
          BRAND: ${{ matrix.brand }}
          BUILD_TYPE: ${{ env.BUILD_TYPE }}
        run: bash ./scripts/build-android.sh

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: android-apks-${{ matrix.brand }}
          path: dist/android/${{ matrix.brand }}/*.apk
          if-no-files-found: error

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build-windows-installer, build-macos-installer, build-android-apk]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      always() &&
      needs.build-windows-installer.result == 'success' &&
      needs.build-android-apk.result == 'success' &&
      (needs.build-macos-installer.result == 'success' || needs.build-macos-installer.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -maxdepth 2 -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexusVPN ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
