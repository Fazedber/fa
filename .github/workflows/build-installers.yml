name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (for example 1.0.0)"
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.22.0"
  GOMOBILE_VERSION: "v0.0.0-20240716161057-1ad2df20a8b6"

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${REF_NAME#v}"
          fi

          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

  validate-core:
    name: Validate Go Core
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Download dependencies
        working-directory: ./core
        run: go mod download

      - name: Run core tests
        working-directory: ./core
        run: go test ./...

  build-windows-installer:
    name: Windows Installer
    runs-on: windows-2022
    needs: [prepare, validate-core]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Prepare Windows code-signing certificate
        shell: pwsh
        env:
          WINDOWS_SIGN_CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_PFX_BASE64 }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERT_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERT_PASSWORD)) {
            Write-Host "Windows signing certificate not configured; continuing without Authenticode signing."
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "windows-codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_PFX_BASE64))
          "WINDOWS_SIGN_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_SIGN_CERT_PASSWORD=$($env:WINDOWS_SIGN_CERT_PASSWORD)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Nebula installer
        shell: pwsh
        run: .\scripts\build-installer-windows.ps1 -Brand "Nebula" -Version "${env:VERSION}"

      - name: Build PepeWatafa installer
        shell: pwsh
        run: .\scripts\build-installer-windows.ps1 -Brand "PepeWatafa" -Version "${env:VERSION}"

      - name: Upload Windows installers
        uses: actions/upload-artifact@v7
        with:
          name: windows-installers
          path: dist/windows/*-Setup.exe
          if-no-files-found: error

  build-macos-installer:
    name: macOS Installer
    runs-on: macos-14
    needs: [prepare, validate-core]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Install dependencies
        shell: bash
        run: |
          brew install create-dmg xcodegen
          go install golang.org/x/mobile/cmd/gomobile@${GOMOBILE_VERSION}
          go install golang.org/x/mobile/cmd/gobind@${GOMOBILE_VERSION}

      - name: Prepare Apple signing certificate
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$APPLE_KEYCHAIN_PASSWORD" ]; then
            echo "Apple signing certificate not configured; continuing with unsigned/notarization-skipped DMG."
            exit 0
          fi

          cert_path="$RUNNER_TEMP/apple-signing.p12"
          keychain_path="$RUNNER_TEMP/build-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$cert_path"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild \
            -T /usr/bin/xcrun
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"

          {
            echo "APPLE_BUILD_KEYCHAIN=$keychain_path"
          } >> "$GITHUB_ENV"

      - name: Build Nebula XCFramework
        shell: bash
        env:
          BRAND: Nebula
          VERSION: ${{ env.VERSION }}
          BUILD_PHASE: xcframework
        run: bash ./scripts/build-macos.sh

      - name: Build Nebula app
        shell: bash
        env:
          BRAND: Nebula
          VERSION: ${{ env.VERSION }}
          BUILD_PHASE: app
        run: bash ./scripts/build-macos.sh

      - name: Package Nebula DMG
        shell: bash
        env:
          BRAND: Nebula
          VERSION: ${{ env.VERSION }}
          SKIP_APP_BUILD: "1"
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash ./scripts/build-installer-macos.sh

      - name: Build PepeWatafa XCFramework
        shell: bash
        env:
          BRAND: PepeWatafa
          VERSION: ${{ env.VERSION }}
          BUILD_PHASE: xcframework
        run: bash ./scripts/build-macos.sh

      - name: Build PepeWatafa app
        shell: bash
        env:
          BRAND: PepeWatafa
          VERSION: ${{ env.VERSION }}
          BUILD_PHASE: app
        run: bash ./scripts/build-macos.sh

      - name: Package PepeWatafa DMG
        shell: bash
        env:
          BRAND: PepeWatafa
          VERSION: ${{ env.VERSION }}
          SKIP_APP_BUILD: "1"
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash ./scripts/build-installer-macos.sh

      - name: Upload macOS installers
        uses: actions/upload-artifact@v7
        with:
          name: macos-installers
          path: dist/macos/*.dmg
          if-no-files-found: error

      - name: Upload macOS build logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: macos-build-logs
          path: dist/macos/**/*.log
          if-no-files-found: ignore

      - name: Clean up Apple signing keychain
        if: always()
        shell: bash
        run: |
          if [ -n "${APPLE_BUILD_KEYCHAIN:-}" ] && [ -f "${APPLE_BUILD_KEYCHAIN}" ]; then
            security delete-keychain "${APPLE_BUILD_KEYCHAIN}" || true
          fi

  build-android-apk:
    name: Android APK (${{ matrix.brand }})
    runs-on: ubuntu-latest
    needs: [prepare, validate-core]
    strategy:
      fail-fast: false
      matrix:
        brand: [nebula, pepewatafa]
    env:
      VERSION_NAME: ${{ needs.prepare.outputs.version }}
      VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/go.sum

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.7"

      - name: Prepare Android signing keystore
        id: android-signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "build_type=debug" >> "$GITHUB_OUTPUT"
            echo "Android release keystore not configured; producing installable debug APK."
            exit 0
          fi

          keystore_path="$RUNNER_TEMP/android-release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          {
            echo "ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

          echo "build_type=release" >> "$GITHUB_OUTPUT"

      - name: Provision Android SDK and NDK
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          if [ ! -d "$sdk_root" ]; then
            echo "Android SDK not found at $sdk_root" >&2
            exit 1
          fi

          if [ -x "$sdk_root/cmdline-tools/latest/bin/sdkmanager" ]; then
            sdkmanager_bin="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
            echo "$sdk_root/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          elif [ -x "$sdk_root/cmdline-tools/bin/sdkmanager" ]; then
            sdkmanager_bin="$sdk_root/cmdline-tools/bin/sdkmanager"
            echo "$sdk_root/cmdline-tools/bin" >> "$GITHUB_PATH"
          else
            echo "sdkmanager was not found under $sdk_root" >&2
            exit 1
          fi

          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "$sdk_root/platform-tools" >> "$GITHUB_PATH"

          yes | "$sdkmanager_bin" --licenses >/dev/null || true
          "$sdkmanager_bin" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264"

          toolchain_bin="$sdk_root/ndk/26.3.11579264/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_NDK_HOME=$sdk_root/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$sdk_root/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "NDK_HOME=$sdk_root/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Install gomobile
        shell: bash
        run: |
          go install golang.org/x/mobile/cmd/gomobile@${GOMOBILE_VERSION}
          go install golang.org/x/mobile/cmd/gobind@${GOMOBILE_VERSION}

      - name: Build Android Go AAR
        shell: bash
        env:
          BRAND: ${{ matrix.brand }}
          BUILD_PHASE: aar
          VERSION_NAME: ${{ env.VERSION_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: bash ./scripts/build-android.sh

      - name: Build APK
        shell: bash
        env:
          BRAND: ${{ matrix.brand }}
          BUILD_TYPE: ${{ steps.android-signing.outputs.build_type }}
          BUILD_PHASE: apk
          VERSION_NAME: ${{ env.VERSION_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
        run: bash ./scripts/build-android.sh

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: android-apks-${{ matrix.brand }}
          path: dist/android/${{ matrix.brand }}/*.apk
          if-no-files-found: error

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build-windows-installer, build-macos-installer, build-android-apk]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      always() &&
      needs.build-windows-installer.result == 'success' &&
      needs.build-android-apk.result == 'success' &&
      needs.build-macos-installer.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -maxdepth 2 -type f | sort

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NAME: NexusVPN ${{ github.ref_name }}
          TAG_NAME: ${{ github.ref_name }}
          TARGET_REPOSITORY: ${{ github.repository }}
        run: |
          mapfile -t assets < <(find artifacts -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          notes_file="$RUNNER_TEMP/release-notes.md"
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${TARGET_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > "$notes_file"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
            gh release edit "${TAG_NAME}" --title "${RELEASE_NAME}" --notes-file "$notes_file"
          else
            gh release create "${TAG_NAME}" "${assets[@]}" --title "${RELEASE_NAME}" --notes-file "$notes_file"
          fi
