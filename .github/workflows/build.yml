name: Build NexusVPN

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-core:
    name: Build Go Core
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      working-directory: ./core
      run: go mod download
    
    - name: Run tests
      working-directory: ./core
      run: go test -v ./...
    
    - name: Build Linux binary
      working-directory: ./core
      run: go build -ldflags="-s -w" -o ../dist/linux/nexus-core ./cmd/desktop
    
    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: linux-core
        path: dist/linux/nexus-core

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: build-core
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Build Go Core
      working-directory: ./core
      run: go build -ldflags="-s -w" -o ../dist/windows/nexus-core.exe ./cmd/desktop
    
    - name: Build UI (Nebula)
      working-directory: ./apps/windows/NexusVPN
      run: |
        dotnet restore
        dotnet publish -c Release -p:AppBrand=Nebula --self-contained false -o ../../../dist/windows/Nebula/UI
    
    - name: Build UI (PepeWatafa)
      working-directory: ./apps/windows/NexusVPN
      run: |
        dotnet publish -c Release -p:AppBrand=PepeWatafa --self-contained false -o ../../../dist/windows/PepeWatafa/UI
    
    - name: Create install scripts
      shell: pwsh
      run: |
        @'
        @echo off
echo Installing Nebula VPN...
net session >nul 2>&1
if %errorLevel% neq 0 (
    echo ERROR: Run as Administrator
    pause
    exit /b 1
)
set INSTALL_DIR=%ProgramFiles%\Nebula
mkdir "%INSTALL_DIR%" 2>nul
copy /Y "%~dp0nexus-core.exe" "%INSTALL_DIR%\"
xcopy /E /I /Y "%~dp0UI" "%INSTALL_DIR%\UI\" 2>nul
sc create Nebula binPath= ""%INSTALL_DIR%\nexus-core.exe"" start= auto
echo Installation complete!
pause
'@ | Out-File -FilePath dist/windows/Nebula/install.bat -Encoding ASCII

        @'
        @echo off
echo Uninstalling Nebula VPN...
net session >nul 2>&1
if %errorLevel% neq 0 (
    echo ERROR: Run as Administrator
    pause
    exit /b 1
)
sc stop Nebula 2>nul
sc delete Nebula 2>nul
rmdir /S /Q "%ProgramFiles%\Nebula" 2>nul
echo Uninstalled!
pause
'@ | Out-File -FilePath dist/windows/Nebula/uninstall.bat -Encoding ASCII
    
    - name: Upload Windows builds
      uses: actions/upload-artifact@v4
      with:
        name: windows-builds
        path: dist/windows/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: build-core
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init
    
    - name: Build Go Core (AAR)
      working-directory: ./core
      run: |
        gomobile bind -target=android/arm64,android/arm \
          -o ../apps/android/app/libs/core.aar \
          ./api
    
    - name: Build APK (Nebula)
      working-directory: ./apps/android
      run: |
        chmod +x gradlew
        ./gradlew assembleNebulaDebug
    
    - name: Build APK (PepeWatafa)
      working-directory: ./apps/android
      run: ./gradlew assemblePepewatafaDebug
    
    - name: Upload Android builds
      uses: actions/upload-artifact@v4
      with:
        name: android-builds
        path: |
          apps/android/app/build/outputs/apk/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create ZIP archives
      run: |
        cd artifacts
        zip -r ../NexusVPN-Windows.zip windows-builds/
        zip -r ../NexusVPN-Android.zip android-builds/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          NexusVPN-Windows.zip
          NexusVPN-Android.zip
        draft: true
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
